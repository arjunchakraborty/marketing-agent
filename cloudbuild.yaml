# Cloud Build configuration for deploying to Cloud Run
# Usage: gcloud builds submit --config cloudbuild.yaml
#
# Prerequisites:
# 1. Enable required APIs: Cloud Run, Cloud Build, Container Registry, Secret Manager
# 2. Create secrets in Secret Manager (api-keys, openai-api-key, etc.)
# 3. Grant Cloud Run service account access to secrets
#
# To customize deployment, set substitution variables:
# gcloud builds submit --config cloudbuild.yaml \
#   --substitutions=_REGION=us-west1,_MEMORY=4Gi,_CPU=4

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/marketing-agent-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/marketing-agent-backend:latest'
      - './backend'
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/marketing-agent-backend:$COMMIT_SHA']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/marketing-agent-backend:latest']
  
  # Deploy container image to Cloud Run
  # IMPORTANT: Before deploying, update the following:
  # 1. Set _ALLOWED_ORIGINS to your actual frontend domain(s)
  # 2. If using Secret Manager, uncomment the --set-secrets line and update secret names
  # 3. If not using secrets, remove --set-secrets and add --set-env-vars for API keys
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'marketing-agent-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/marketing-agent-backend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '${_MEMORY}'
      - '--cpu'
      - '${_CPU}'
      - '--timeout'
      - '${_TIMEOUT}'
      - '--max-instances'
      - '${_MAX_INSTANCES}'
      - '--min-instances'
      - '${_MIN_INSTANCES}'
      # Option 1: Use Secret Manager (recommended for production)
      # Uncomment the following lines after creating secrets in Secret Manager:
      # - '--set-secrets'
      # - 'API_KEYS=api-keys:latest,OPENAI_API_KEY=openai-api-key:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest'
      # Option 2: Use environment variables (not recommended for secrets)
      # Replace the line below with your actual API keys (⚠️ WARNING: visible in build logs)
      # - '--set-env-vars'
      # - 'API_KEYS=your-key-1,your-key-2,OPENAI_API_KEY=your-openai-key'
      # Set non-sensitive environment variables
      - '--set-env-vars'
      - 'ALLOWED_ORIGINS=${_ALLOWED_ORIGINS},LOG_LEVEL=${_LOG_LEVEL}'

images:
  - 'gcr.io/$PROJECT_ID/marketing-agent-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/marketing-agent-backend:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Substitution variables with defaults
# Override these when submitting the build:
# gcloud builds submit --config cloudbuild.yaml \
#   --substitutions=_REGION=us-west1,_ALLOWED_ORIGINS=https://example.com
substitutions:
  _REGION: 'us-central1'
  _MEMORY: '2Gi'
  _CPU: '2'
  _TIMEOUT: '300'
  _MAX_INSTANCES: '10'
  _MIN_INSTANCES: '0'
  _ALLOWED_ORIGINS: 'https://your-frontend-domain.com'
  _LOG_LEVEL: 'INFO'

